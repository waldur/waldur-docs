Test changelog generation:
  image: registry.hpc.ut.ee/mirror/library/python:3.12
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    CI_COMMIT_TAG_MESSAGE: "Tag message"
    CI_RELEASE_DESCRIPTION: "Release description"
    CI_COMMIT_TAG: "v10.0.0"
  script:
    - export VERSION=${CI_COMMIT_TAG}
    - PREV_TAG=$(grep -m 1 "^## " docs/about/CHANGELOG.md | sed 's/^## \([^ ]*\).*/\1/')
    - echo "Testing enhanced changelog generation for $VERSION (since $PREV_TAG)"
    - python3 scripts/generate-enhanced-changelog-multiRepo.py $VERSION $PREV_TAG | sed -n '/^## /,/^---$/p' | head -n -1 > /tmp/new_entry.md
    - echo "Generated enhanced changelog entry:"
    - cat /tmp/new_entry.md

Test RC release logic:
  image: registry.hpc.ut.ee/mirror/library/python:3.12
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    ANY_RELEASE_RE: '^\d+\.\d+\.\d+(-rc\.\d+)?$'
    STABLE_RE: '^\d+\.\d+\.\d+$'
  script:
    - echo "=== Test 1 — Any-release regex accepts stable and RC tags ==="
    - echo "8.0.6"      | grep -qP "$ANY_RELEASE_RE" && echo "  PASS 8.0.6"
    - echo "8.0.6-rc.1" | grep -qP "$ANY_RELEASE_RE" && echo "  PASS 8.0.6-rc.1"
    - echo "8.0.6-rc.12"| grep -qP "$ANY_RELEASE_RE" && echo "  PASS 8.0.6-rc.12"
    - echo "10.0.0"     | grep -qP "$ANY_RELEASE_RE" && echo "  PASS 10.0.0"
    - echo "=== Test 2 — Any-release regex rejects invalid tags ==="
    - echo "8.0.6-beta.1" | grep -qP "$ANY_RELEASE_RE" && exit 1 || echo "  PASS rejected 8.0.6-beta.1"
    - echo "8.0.6-alpha"  | grep -qP "$ANY_RELEASE_RE" && exit 1 || echo "  PASS rejected 8.0.6-alpha"
    - echo "8.0.6rc1"     | grep -qP "$ANY_RELEASE_RE" && exit 1 || echo "  PASS rejected 8.0.6rc1"
    - echo "abc"          | grep -qP "$ANY_RELEASE_RE" && exit 1 || echo "  PASS rejected abc"
    - echo ""             | grep -qP "$ANY_RELEASE_RE" && exit 1 || echo "  PASS rejected (empty)"
    - echo "=== Test 3 — Stable-only regex rejects RC tags ==="
    - echo "8.0.6-rc.1"  | grep -qP "$STABLE_RE" && exit 1 || echo "  PASS rejected 8.0.6-rc.1"
    - echo "8.0.6-rc.12" | grep -qP "$STABLE_RE" && exit 1 || echo "  PASS rejected 8.0.6-rc.12"
    - echo "=== Test 4 — Stable-only regex accepts stable tags ==="
    - echo "8.0.6"  | grep -qP "$STABLE_RE" && echo "  PASS 8.0.6"
    - echo "10.0.0" | grep -qP "$STABLE_RE" && echo "  PASS 10.0.0"
    - echo "=== Test 5 — IS_RC detection ==="
    - '[[ "8.0.6-rc.1"  =~ -rc\. ]] && echo "  PASS 8.0.6-rc.1 detected as RC"'
    - '[[ "8.0.6-rc.12" =~ -rc\. ]] && echo "  PASS 8.0.6-rc.12 detected as RC"'
    - '[[ "8.0.6"  =~ -rc\. ]] && exit 1 || echo "  PASS 8.0.6 not detected as RC"'
    - '[[ "10.0.0" =~ -rc\. ]] && exit 1 || echo "  PASS 10.0.0 not detected as RC"'
    - echo "=== All RC release logic tests passed ==="

Tag all repositories:
  image: registry.hpc.ut.ee/mirror/library/python:3.12
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+(-rc\.\d+)?$/'
  before_script:
    - apt-get update && apt-get install -y git libsasl2-dev libldap2-dev
    - git config --global user.name "$GITLAB_USER_NAME"
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git remote -v
    - git fetch origin master
    - git branch -D master || true
    - git checkout --track origin/master
    - git pull
    - export VERSION=${CI_COMMIT_TAG}
    - echo $CI_COMMIT_TAG_MESSAGE
    - echo $CI_RELEASE_DESCRIPTION
    - |
      if [[ "$CI_COMMIT_TAG" =~ -rc\. ]]; then
        export IS_RC=true
        echo "RC release detected — skipping changelog, OpenAPI schema, and publiccode.yml"
      fi
    - PREV_TAG=$(grep -m 1 "^## " docs/about/CHANGELOG.md | sed 's/^## \([^ ]*\).*/\1/')
    # Check if changelog entry already exists (e.g., created by local release script)
    - |
      if [ "$IS_RC" != "true" ]; then
        if grep -q "^## ${VERSION}" docs/about/CHANGELOG.md; then
          echo "Changelog entry for ${VERSION} already exists — skipping auto-generation."
        else
          echo "No existing entry — generating changelog automatically..."
          echo "Generating enhanced changelog for $VERSION (since $PREV_TAG)"
          python3 scripts/generate-enhanced-changelog-multiRepo.py $VERSION $PREV_TAG | sed -n '/^## /,/^---$/p' | head -n -1 > /tmp/new_entry.md
          echo "Generated enhanced changelog entry:"
          cat /tmp/new_entry.md
          # Update changelog with rotation (keep only last 20 entries)
          if [ $(grep -c "^## " docs/about/CHANGELOG.md) -gt 20 ]; then
            echo "Rotating old changelog entries to archive..."
            head -n $(awk '/^## /{count++} count==20{print NR-1; exit}' docs/about/CHANGELOG.md) docs/about/CHANGELOG.md > /tmp/rotated_changelog.md 2>/dev/null || cp docs/about/CHANGELOG.md /tmp/rotated_changelog.md
            mv /tmp/rotated_changelog.md docs/about/CHANGELOG.md
          fi
          # Add new entry to top of changelog
          echo -e "# Changelog\n" > /tmp/final_changelog.md
          cat /tmp/new_entry.md >> /tmp/final_changelog.md
          echo "" >> /tmp/final_changelog.md
          tail -n +3 docs/about/CHANGELOG.md >> /tmp/final_changelog.md
          mv /tmp/final_changelog.md docs/about/CHANGELOG.md
        fi
      else
        echo "RC release — skipping changelog generation."
      fi
    # Update publiccode.yml with release version and date
    - |
      if [ "$IS_RC" != "true" ]; then
        sed -i "s/^softwareVersion: .*/softwareVersion: ${VERSION}/" publiccode.yml
        sed -i "s/^releaseDate: .*/releaseDate: $(date +%Y-%m-%d)/" publiccode.yml
      else
        echo "RC release — skipping publiccode.yml update."
      fi
    - |
      if [ "$IS_RC" != "true" ]; then
        git add publiccode.yml docs/about/CHANGELOG.md
        if ! git diff --cached --quiet; then
          git --no-pager diff --cached --stat
          git commit -m "Release ${CI_COMMIT_TAG}: update changelog and publiccode.yml"
          git push -o ci.skip origin master
        else
          echo "No release metadata changes to commit."
        fi
      fi
    - cd ../
  script:
    - rm -rf waldur-mastermind || true
    - git clone "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/waldur/waldur-mastermind.git"
    - cd waldur-mastermind/
    - git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE" || echo "Tag $CI_COMMIT_TAG already exists in waldur-mastermind"
    - git push origin $CI_COMMIT_TAG || echo "Tag $CI_COMMIT_TAG already pushed to waldur-mastermind"

    # Generate OpenAPI schema from mastermind (skip for RC releases)
    - |
      if [ "$IS_RC" != "true" ]; then
        pip install uv
        uv sync --group dev
        mkdir -p $CI_PROJECT_DIR/docs/API
        DJANGO_SETTINGS_MODULE=waldur_core.server.doc_settings \
          uv run waldur spectacular \
          --api-version "$CI_COMMIT_TAG" \
          --file "$CI_PROJECT_DIR/docs/API/waldur-openapi-schema-${CI_COMMIT_TAG}.yaml" \
          --fail-on-warn
        echo "Generated OpenAPI schema for ${CI_COMMIT_TAG}"
        # Commit OpenAPI schema to waldur-docs
        cd $CI_PROJECT_DIR
        git add docs/API/waldur-openapi-schema-${CI_COMMIT_TAG}.yaml
        git diff --cached --quiet && echo "OpenAPI schema already committed" || (git commit -m "Add OpenAPI schema for ${CI_COMMIT_TAG}" && git pull --rebase origin master && git push -o ci.skip origin master)
      else
        echo "RC release — skipping OpenAPI schema generation."
      fi

    - cd ../
    - rm -rf waldur-homeport || true
    - git clone "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/waldur/waldur-homeport.git"
    - cd waldur-homeport/
    - git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE" || echo "Tag $CI_COMMIT_TAG already exists in waldur-homeport"
    - git push origin $CI_COMMIT_TAG || echo "Tag $CI_COMMIT_TAG already pushed to waldur-homeport"
    - cd ../
    - rm -rf waldur-helm || true
    - git clone "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/waldur/waldur-helm.git"
    - cd waldur-helm/
    # Add new tag to Chart.yaml and values.yaml
    - |
      sed -i -E -e "s/^version: ('.*'|.*)$/version: $CI_COMMIT_TAG/" waldur/Chart.yaml
    - |
      sed -i -E -e "s/^appVersion: ('.*'|.*)$/appVersion: \"$CI_COMMIT_TAG\"/" waldur/Chart.yaml
    - |
      sed -i -E -e "s/^  imageTag: ('.*'|.*)$/  imageTag: \"$CI_COMMIT_TAG\"/" waldur/values.yaml
    - git status
    - git diff
    - git add waldur/Chart.yaml waldur/values.yaml
    - git diff --cached --quiet && echo "waldur-helm versions already updated" || (git commit -m "Set target version to ${CI_COMMIT_TAG}" && git push -o "ci.skip")
    - git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE" || echo "Tag $CI_COMMIT_TAG already exists in waldur-helm"
    - git push origin $CI_COMMIT_TAG || echo "Tag $CI_COMMIT_TAG already pushed to waldur-helm"
    - cd ../
    - rm -rf waldur-docker-compose || true
    - git clone "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/waldur/waldur-docker-compose.git"
    - cd waldur-docker-compose/
    # Add new tag to .env.example
    - |
      sed -i -E -e "s/^WALDUR_MASTERMIND_IMAGE_TAG=('.*'|.*)$/WALDUR_MASTERMIND_IMAGE_TAG=$CI_COMMIT_TAG/" .env.example
    - |
      sed -i -E -e "s/^WALDUR_HOMEPORT_IMAGE_TAG=('.*'|.*)$/WALDUR_HOMEPORT_IMAGE_TAG=$CI_COMMIT_TAG/" .env.example
    - git status
    - git diff
    - git add .env.example
    - git diff --cached --quiet && echo "waldur-docker-compose versions already updated" || (git commit -m "Set target version to ${CI_COMMIT_TAG}" && git push -o "ci.skip")
    - git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE" || echo "Tag $CI_COMMIT_TAG already exists in waldur-docker-compose"
    - git push origin $CI_COMMIT_TAG || echo "Tag $CI_COMMIT_TAG already pushed to waldur-docker-compose"
    - cd ../
    - rm -rf waldur-prometheus-exporter || true
    - git clone "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/waldur/waldur-prometheus-exporter.git"
    - cd waldur-prometheus-exporter/
    - git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE"
    - git push origin $CI_COMMIT_TAG

Release Python SDK:
  image:
    name: registry.hpc.ut.ee/mirror/alpine/git:v2.49.1
    entrypoint: [""]
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
  before_script: *build_before_script
  script:
    - |
      git clone git@github.com:waldur/py-client.git
      cd py-client/
      sed -i 's/^version = "[^"]*"/version = "'$CI_COMMIT_TAG'"/' pyproject.toml
      git add pyproject.toml
      git diff --cached --quiet && echo "py-client version already set" || git commit -m "Release: bump version to $CI_COMMIT_TAG"
      git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE" || echo "Tag $CI_COMMIT_TAG already exists in py-client"
      git push origin $CI_COMMIT_TAG || echo "Tag $CI_COMMIT_TAG already pushed to py-client"
      git push origin main || echo "main already up to date in py-client"

Release TypeScript/JavaScript SDK:
  image:
    name: registry.hpc.ut.ee/mirror/alpine/git:v2.49.1
    entrypoint: [""]
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
  before_script: *build_before_script
  script:
    - |
      git clone git@github.com:waldur/js-client.git
      cd js-client/
      sed -i 's/"version": "[^"]*"/"version": "'$CI_COMMIT_TAG'"/' package.json
      # Update top-level version
      sed -i '0,/"version": "[^"]*"/{s/"version": "[^"]*"/"version": "'$CI_COMMIT_TAG'"/}' package-lock.json
      # Update version in the root package object (packages[""])
      sed -i '/"packages": {/,/"devDependencies":/{s/"version": "[^"]*"/"version": "'$CI_COMMIT_TAG'"/}' package-lock.json
      git add package.json package-lock.json
      git diff --cached --quiet && echo "js-client version already set" || git commit -m "Release: bump version to $CI_COMMIT_TAG"
      git tag -a $CI_COMMIT_TAG -m "$CI_COMMIT_TAG_MESSAGE" || echo "Tag $CI_COMMIT_TAG already exists in js-client"
      git push origin $CI_COMMIT_TAG || echo "Tag $CI_COMMIT_TAG already pushed to js-client"
      git push origin main || echo "main already up to date in js-client"

